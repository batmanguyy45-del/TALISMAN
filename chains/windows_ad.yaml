name: windows_ad
version: "1.0"
description: "Active Directory security assessment — LDAP enum, Kerberoasting, SMB, AS-REP"
tags: [activedirectory, windows, kerberos, smb]
rate_profile: stealth

steps:
  - id: ad_recon
    module: ad.recon
    args:
      collect: [users, groups, computers, spns, asrep]

  - id: kerberos_attacks
    module: ad.kerberos
    depends_on: [ad_recon]
    args:
      kerberoast: true
      asreproast: true

  - id: smb_audit
    module: ad.smb
    parallel: true
    args:
      enum_shares: true
      null_session: true
      signing_check: true
