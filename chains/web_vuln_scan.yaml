name: web_vuln_scan
version: "1.0"
description: "Comprehensive web vulnerability scan — all OWASP Top 10 + beyond"
tags: [web, scanner, vuln]
rate_profile: normal

steps:
  - id: tech_detect
    module: recon.tech
    args:
      waf_detect: true

  - id: header_audit
    module: scanner.headers
    parallel: true

  - id: cors_scan
    module: scanner.cors
    parallel: true

  - id: xss_scan
    module: scanner.xss
    args:
      waf_bypass: false

  - id: sqli_scan
    module: scanner.sqli
    args:
      techniques: [error, boolean, time]

  - id: ssrf_scan
    module: scanner.ssrf

  - id: cmdi_scan
    module: scanner.cmdi

  - id: ssti_scan
    module: scanner.ssti

  - id: lfi_scan
    module: scanner.lfi

  - id: redirect_scan
    module: scanner.open_redirect
    parallel: true

  - id: cache_scan
    module: scanner.cache_poison
    parallel: true

  - id: idor_scan
    module: scanner.idor

  - id: proto_scan
    module: scanner.proto
    parallel: true

  - id: smuggle_scan
    module: scanner.smuggle

  - id: nosqli_scan
    module: scanner.nosqli
    parallel: true

  - id: deserialize_scan
    module: scanner.deserialize
    parallel: true

  - id: websocket_scan
    module: scanner.websocket
    parallel: true

  - id: misconfig_scan
    module: misconfig.server
    parallel: true

  - id: rate_limit_check
    module: scanner.rate_limit
    parallel: true

  - id: host_header_scan
    module: scanner.host
    parallel: true

  - id: csrf_scan
    module: scanner.csrf
    parallel: true

  - id: mass_assignment_scan
    module: scanner.mass
    parallel: true

  - id: cache_deception_scan
    module: scanner.cache_deception
    parallel: true

  - id: parser_diff_scan
    module: scanner.parser
    parallel: true

  - id: second_order_scan
    module: scanner.second_order
    parallel: true

  - id: sspp_scan
    module: scanner.sspp
    parallel: true

  - id: verb_tamper_scan
    module: scanner.verb
    parallel: true

  - id: file_upload_scan
    module: scanner.upload
    parallel: true

  - id: git_exposure_scan
    module: scanner.git
    parallel: true

  - id: dep_confusion_scan
    module: scanner.depconf
    parallel: true

  - id: csp_deep_scan
    module: scanner.csp
    parallel: true
